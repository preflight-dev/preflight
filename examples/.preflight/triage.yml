# .preflight/triage.yml — Customize prompt triage rules
# Controls how preflight classifies incoming prompts.

# Strictness level:
#   relaxed  — only flag very short/vague prompts
#   standard — balanced (default)
#   strict   — flag anything without explicit file refs or scope
strictness: standard

rules:
  # Keywords that ALWAYS trigger a clarification check, even in longer prompts.
  # Use for high-risk areas where vague instructions are costly.
  always_check:
    - rewards
    - permissions
    - migration
    - schema
    - billing
    - auth
    # - payments      # uncomment for your domain
    # - deploy

  # Keywords that SKIP triage entirely (low-risk, unambiguous commands).
  skip:
    - commit
    - format
    - lint
    - "git status"
    - "npm test"
    - "type-check"

  # Keywords that trigger cross-service contract analysis.
  # When detected, preflight checks related_projects for shared types/routes.
  cross_service_keywords:
    - auth
    - notification
    - event
    - webhook
    - api
    - graphql
