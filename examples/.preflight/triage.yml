# =============================================================================
# .preflight/triage.yml — Customize how prompts get classified
# =============================================================================
# Controls which prompts trigger checks and which pass through.
# Tune this per-project: a payments service needs stricter rules than a blog.
# =============================================================================

# Strictness level for the triage engine.
#   relaxed  — only flag very short/vague prompts, trust the developer more
#   standard — balanced heuristics (default)
#   strict   — flag anything without explicit file refs or clear scope
strictness: standard

rules:
  # Keywords that ALWAYS trigger ambiguity checks, even if the prompt looks clear.
  # Use this for dangerous areas of your codebase where you want forced clarity.
  always_check:
    - rewards
    - permissions
    - migration
    - schema
    - billing
    - delete
    # Add your project's sensitive areas:
    # - payments
    # - user-data
    # - deploy

  # Keywords that skip all checks — these are quick, safe commands.
  # Preflight passes them through with zero overhead.
  skip:
    - commit
    - format
    - lint
    - status
    - log
    - help
    # Add your own safe commands:
    # - test
    # - build

  # Keywords that trigger cross-service contract search.
  # When detected, preflight pulls types/interfaces from related_projects
  # to show you what might break across service boundaries.
  cross_service_keywords:
    - auth
    - notification
    - event
    - webhook
    - shared
    # Add your inter-service touchpoints:
    # - queue
    # - pubsub
    # - grpc
