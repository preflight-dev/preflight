# .preflight/triage.yml
# Controls how preflight classifies your prompts.

rules:
  # Prompts containing these words are always flagged as at least AMBIGUOUS.
  # Add your core domain objects — the things that are dangerous to get wrong.
  always_check:
    - rewards
    - permissions
    - migration
    - schema
    - billing
    # - your-domain-keyword

  # Prompts containing these words pass through as TRIVIAL.
  # Safe, routine commands that don't need scrutiny.
  skip:
    - commit
    - format
    - lint
    - "git status"
    - "run tests"

  # Prompts containing these words escalate to CROSS-SERVICE.
  # These trigger contract search across related_projects.
  cross_service_keywords:
    - auth
    - notification
    - event
    - webhook
    - shared

# How aggressively to classify:
#   "relaxed"  — more prompts pass as clear
#   "standard" — balanced (recommended)
#   "strict"   — more prompts flagged as ambiguous
strictness: standard
