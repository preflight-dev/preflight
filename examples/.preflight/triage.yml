# .preflight/triage.yml — Controls how preflight classifies your prompts.
# Customize these rules to match your project's domain vocabulary.

rules:
  # Prompts containing these keywords are always flagged as AMBIGUOUS or higher.
  # Add domain-specific terms that tend to produce vague requests.
  always_check:
    - rewards
    - permissions
    - migration
    - schema
    # Add your own:
    # - billing
    # - deployment
    # - auth

  # Prompts containing these keywords pass through as TRIVIAL.
  # These are routine commands where clarification adds no value.
  skip:
    - commit
    - format
    - lint
    # Add your own:
    # - typecheck
    # - "git status"

  # Prompts containing these keywords trigger CROSS-SERVICE checks.
  # These scan related_projects (from config.yml) for shared contracts.
  cross_service_keywords:
    - auth
    - notification
    - event
    - webhook
    # Add your own:
    # - graphql
    # - grpc
    # - queue

# How aggressively to classify prompts.
#   "relaxed"  — more prompts pass as clear (less interruption)
#   "standard" — balanced (default)
#   "strict"   — more prompts flagged as ambiguous (maximum savings)
strictness: standard
