# =============================================================================
# .preflight/config.yml — Team-shareable preflight configuration
# =============================================================================
# Drop this in your project root as .preflight/config.yml
# When present, env vars (PROMPT_DISCIPLINE_PROFILE, etc.) are ignored.
# All fields are optional — defaults are shown below.
# =============================================================================

# Profile controls how aggressively preflight checks your prompts.
#   minimal  — only catch the most ambiguous prompts, low friction
#   standard — balanced (default) — catches vague prompts + cross-service issues
#   full     — maximum checking, scorecards, cost estimates on every prompt
profile: standard

# Related projects for cross-service contract awareness.
# Preflight extracts types, interfaces, routes, and schemas from these
# so it can warn you when a change in your project affects another.
related_projects:
  - path: ../auth-service
    alias: auth
  - path: ../billing-api
    alias: billing
  # - path: ../shared-types
  #   alias: types

# Tuning knobs for preflight behavior.
thresholds:
  # Minutes before a session is considered "stale" and context recovery kicks in.
  session_stale_minutes: 30

  # After this many tool calls without a checkpoint, preflight nudges you
  # to pause and verify you're still on track.
  max_tool_calls_before_checkpoint: 100

  # How many keyword matches from past corrections before preflight warns you.
  # Lower = more warnings. Set to 1 if you keep making the same mistakes.
  correction_pattern_threshold: 3

# Embedding configuration for session search (search_sessions tool).
embeddings:
  # "local" — uses built-in embeddings, no API key needed (default)
  # "openai" — uses OpenAI text-embedding-3-small for higher quality search
  provider: local
  # openai_api_key: sk-...  # Or set OPENAI_API_KEY env var before switching to openai
