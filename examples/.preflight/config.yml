# .preflight/config.yml
# Drop this file in your project root. Every field is optional.

# Profile controls overall verbosity:
#   "minimal"  — only flag ambiguous+, skip clarification detail
#   "standard" — default behavior
#   "full"     — maximum detail on every non-trivial prompt
profile: standard

# Related projects for cross-service contract awareness.
# When your prompt mentions a keyword from a related project,
# preflight searches that project's contracts and session history.
related_projects:
  - path: /Users/you/projects/auth-service
    alias: auth-service
  - path: /Users/you/projects/shared-types
    alias: shared-types
  # Add more as needed:
  # - path: /Users/you/projects/notifications
  #   alias: notifications

# Behavioral thresholds
thresholds:
  # Warn if no session activity for this many minutes
  session_stale_minutes: 30

  # Suggest a checkpoint after this many tool calls
  max_tool_calls_before_checkpoint: 100

  # Minimum corrections before preflight detects a recurring pattern
  correction_pattern_threshold: 3

# Embedding provider for semantic search
# "local" uses Xenova (no API key needed, runs on-device)
# "openai" uses OpenAI embeddings (requires openai_api_key)
embeddings:
  provider: local
  # openai_api_key: sk-...  # uncomment if using openai provider
