# .preflight/config.yml — Drop this in your project root.
# Every field is optional. Preflight works out of the box with sensible defaults.
# Commit this to your repo so your whole team gets the same behavior.

# Profile controls how much detail preflight surfaces.
#   "minimal"  — only flag ambiguous+, skip clarification detail
#   "standard" — balanced (default)
#   "full"     — maximum detail on every non-trivial prompt
profile: standard

# Related projects for cross-service contract awareness.
# Preflight scans these for shared types, interfaces, and API routes
# so it can warn when a change in one project might break another.
related_projects:
  # Example: a backend API that your frontend talks to
  # - path: /Users/you/projects/my-api
  #   alias: api

  # Example: a shared types package
  # - path: /Users/you/projects/shared-types
  #   alias: shared

# Behavioral thresholds — tune these to your workflow.
thresholds:
  # Warn if no session activity for this many minutes
  session_stale_minutes: 30

  # Suggest a checkpoint after this many tool calls in one session
  max_tool_calls_before_checkpoint: 100

  # Minimum correction occurrences before flagging as a pattern
  # (e.g., if you keep correcting "use the auth module" 3+ times,
  # preflight learns to warn you proactively)
  correction_pattern_threshold: 3

# Embedding configuration for vector search (timeline tools).
# Local embeddings work offline with no API key — they just need
# a one-time ~90MB model download on first use.
embeddings:
  # "local" — Xenova/all-MiniLM-L6-v2, runs on-device, no API key needed
  # "openai" — OpenAI text-embedding-3-small, needs OPENAI_API_KEY
  # "ollama" — Local Ollama server, needs `ollama serve` running
  provider: local

  # Only needed if provider is "openai":
  # openai_api_key: sk-...
