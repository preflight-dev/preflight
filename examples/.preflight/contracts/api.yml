# .preflight/contracts/api.yml
# Manual contract definitions that supplement auto-extraction.
# Use these for shared types that span multiple services,
# or for contracts that auto-extraction doesn't pick up.

- name: User
  kind: interface
  description: Core user object shared across services
  fields:
    - name: id
      type: string
      required: true
    - name: email
      type: string
      required: true
    - name: role
      type: "'admin' | 'member' | 'viewer'"
      required: true
    - name: organizationId
      type: string
      required: true

- name: RewardsTier
  kind: interface
  description: Reward tier levels and their perks
  fields:
    - name: tier
      type: "'free' | 'pro' | 'enterprise'"
      required: true
    - name: multiplier
      type: number
      required: true
    - name: perks
      type: string[]
      required: false

- name: ApiResponse
  kind: interface
  description: Standard API response envelope
  fields:
    - name: success
      type: boolean
      required: true
    - name: data
      type: T
      required: false
    - name: error
      type: "{ code: string; message: string }"
      required: false
