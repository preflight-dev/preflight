# .preflight/contracts/api.yml — Manual contract definitions.
#
# These supplement auto-extraction. Use them when:
# - A related service isn't in TypeScript (preflight can't auto-extract)
# - You want to pin a specific contract shape for stability
# - You're documenting an external API your project depends on
#
# Preflight uses these to warn when a prompt might affect shared types.

- name: User
  kind: interface
  description: Core user object shared between frontend and API
  fields:
    - name: id
      type: string
      required: true
    - name: email
      type: string
      required: true
    - name: role
      type: "'admin' | 'member' | 'viewer'"
      required: true
    - name: createdAt
      type: Date
      required: true

- name: ApiResponse
  kind: interface
  description: Standard API response envelope
  fields:
    - name: success
      type: boolean
      required: true
    - name: data
      type: T
      required: false
    - name: error
      type: string
      required: false

